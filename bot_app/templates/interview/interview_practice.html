{% extends "base.html" %}
{% block content %}

<div class="practice-wrapper" style="padding: 4rem 2rem; display: flex; align-items: center; justify-content: center; min-height: 100vh;">
  <div class="glass-panel fade-in" style="max-width: 700px; width: 100%; padding: 4rem; position: relative;">
    <div style="text-align: center; margin-bottom: 3rem;">
        <h2 style="font-size: 3.5rem; margin-bottom: 1.5rem;">Practice Arena</h2>
        <p style="font-size: 1.3rem;">Sharpen your cognitive and technical prowess before the real battle.</p>
    </div>

    <form id="interviewForm" method="post" enctype="multipart/form-data" style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
      {% csrf_token %}
      
      <!-- Interview Type -->
      <div class="form-group">
        <label for="interviewType" class="premium-label">Simulation Type</label>
        <select class="premium-input" id="interviewType" name="interviewType" required>
          <option value="" disabled selected>Select Type</option>
          <option value="aptitude">Aptitude Simulation</option>
          <option value="technical">Technical Simulation</option>
          <option value="hr">Behavioral Simulation</option>
          <option value="all">Full Protocol (All Rounds)</option>
        </select>
      </div>

      <!-- Difficulty -->
      <div class="form-group">
        <label for="difficulty" class="premium-label">Cognitive Load</label>
        <select class="premium-input" id="difficulty" name="difficulty" required>
          <option value="" disabled selected>Select Difficulty</option>
          <option value="easy">Level 1 (Easy)</option>
          <option value="medium">Level 2 (Medium)</option>
          <option value="hard">Level 3 (Hard)</option>
        </select>
      </div>

      <!-- JD Upload -->
      <div class="form-group">
        <label for="jdFile" class="premium-label">Job Architecture (JD)</label>
        <input class="premium-input" type="file" id="jdFile" name="jdFile" accept=".pdf,.doc,.docx" required>
      </div>

      <!-- Resume Upload -->
      <div class="form-group">
        <label for="resumeFile" class="premium-label">Source Identity (Resume)</label>
        <input class="premium-input" type="file" id="resumeFile" name="resumeFile" accept=".pdf,.doc,.docx" required>
      </div>

      <div style="grid-column: span 2; margin-top: 1.5rem;">
        <button id="startDemoBtn" type="button" class="btn-premium" style="width: 100%; padding: 1.25rem; font-size: 1.2rem;">
          <span>🚀 Initialize Neural Link</span>
        </button>
      </div>
    </form>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const startBtn = document.getElementById('startDemoBtn');
  const form = document.getElementById('interviewForm');

  startBtn.onclick = async () => {
    const interviewType = form.querySelector('select[name="interviewType"]').value;
    const difficulty    = form.querySelector('select[name="difficulty"]').value;
    const jdFile        = form.querySelector('input[name="jdFile"]').files[0];
    const resumeFile    = form.querySelector('input[name="resumeFile"]').files[0];

    if (!interviewType || !difficulty || !jdFile || !resumeFile) {
      alert("System Error: Please populate all data vectors before initialization.");
      return;
    }

    startBtn.disabled = true;
    startBtn.innerHTML = '<span>⏳ Linking...</span>';

    try {
      const formData = new FormData(form);
      const saveResp = await fetch("{% url 'save_demo_inputs' %}", {
        method: "POST",
        body: formData,
        headers: { "X-CSRFToken": "{{ csrf_token }}" },
      });

      const saveData = await saveResp.json();

      if (!saveData.success) {
        alert("Linking Failure: Please recalibrate and try again.");
        startBtn.disabled = false;
        startBtn.innerHTML = '<span>🚀 Initialize Neural Link</span>';
        return;
      }

      window.location.href = "{% url 'interview_page' %}";

    } catch (err) {
      console.error("Error starting session:", err);
      alert("Critical Error: Unexpected pulse detected in server.");
      startBtn.disabled = false;
      startBtn.innerHTML = '<span>🚀 Initialize Neural Link</span>';
    }
  };
});
</script>
{% endblock content %}
