{% extends "base.html" %}
{% block content %}

<div class="admin-wrapper" style="padding: 4rem 2rem; max-width: 1200px; margin: 0 auto;">
  <div class="glass-panel fade-in" style="padding: 4rem; position: relative; overflow: hidden;">
    <!-- Decorative background element -->
    <div
      style="position: absolute; top: -100px; left: -100px; width: 300px; height: 300px; background: var(--accent-blue); filter: blur(120px); opacity: 0.15;">
    </div>

    <div
      style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4rem; position: relative; z-index: 1;">
      <div>
        <h2 style="font-size: 3.5rem; margin-bottom: 0.5rem;">HR Command Center</h2>
        <p style="font-size: 1.3rem;">Configure precision evaluation parameters for your candidates.</p>
      </div>
      <div class="glass-card"
        style="padding: 1rem 2rem; border-radius: 100px; display: flex; align-items: center; gap: 12px;">
        <span
          style="width: 10px; height: 10px; background: #10b981; border-radius: 50%; box-shadow: 0 0 10px #10b981;"></span>
        <span style="font-weight: 600; font-size: 0.9rem;">System Active</span>
      </div>
    </div>

    <form id="hrForm"
      style="display: grid; grid-template-columns: 1fr 1fr; gap: 2.5rem; position: relative; z-index: 1;">
      <div class="form-group">
        <label class="premium-label">Intelligence Level</label>
        <select class="premium-input" name="difficulty" id="difficulty">
          <option value="easy">Standard (Easy)</option>
          <option value="medium" selected>Professional (Medium)</option>
          <option value="hard">Expert (Hard)</option>
        </select>
      </div>

      <div class="form-group">
        <label class="premium-label">Evaluation Matrix</label>
        <select class="premium-input" name="round_type" id="round_type">
          <option value="aptitude">Aptitude Assesment</option>
          <option value="technical">Technical Evaluation</option>
          <option value="hr">Behavioral/HR Round</option>
          <option value="all">Comprehensive (All Rounds)</option>
        </select>
      </div>

      <div class="form-group" style="grid-column: span 2;">
        <label class="premium-label">Job Architecture (JD Upload) - <span
            style="color:var(--accent-cyan)">Required</span></label>
        <input type="file" class="premium-input" name="jd_file" id="jd_file" accept=".pdf,.doc,.docx" required>
      </div>

      <div style="grid-column: span 2; margin-top: 1rem;">
        <button type="button" class="btn-premium" id="generateBtn"
          style="width: 100%; padding: 1.5rem; font-size: 1.2rem; letter-spacing: 1px;">
          <span>⚡ Initialize Recruiting Protocol</span>
        </button>
      </div>
    </form>

    <div class="link-box glass-card fade-in" id="linkBox"
      style="margin-top: 4rem; display: none; background: rgba(255,255,255,0.05); border-color: var(--accent-blue);">
      <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <label class="premium-label" style="margin-bottom: 0; font-size: 1.1rem; color: #fff;">Unique Invitation
          Link</label>
        <button class="btn-glass" onclick="copyLink()" style="padding: 8px 20px; font-size: 0.9rem;">Copy Link</button>
      </div>
      <div id="generatedLink"
        style="font-family: monospace; font-size: 1rem; word-break: break-all; color: var(--accent-cyan); background: rgba(0,0,0,0.3); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 3rem;">
        ---
      </div>

      <div style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 3rem;">
        <label class="premium-label" style="font-size: 1.1rem; color: #fff;">Direct Transmission</label>
        <p style="margin-bottom: 1.5rem;">Send invitation directly to candidate's email box.</p>
        <div style="display: flex; gap: 1rem;">
          <input type="email" id="candidateEmail" class="premium-input" placeholder="candidate@example.com"
            style="flex: 1;">
          <button type="button" class="btn-premium" id="sendEmailBtn"
            style="min-width: 140px; background: linear-gradient(135deg, #059669, #10b981);">
            <span>Send Now</span>
          </button>
        </div>
        <p id="emailStatus" style="font-size: 0.9rem; margin-top: 15px; display: none; font-weight: 500;"></p>
      </div>
    </div>
  </div>
</div>

<script>
  async function generateLink() {
    const diff = document.getElementById('difficulty').value;
    const type = document.getElementById('round_type').value;
    const jdFile = document.getElementById('jd_file').files[0];

    if (!jdFile) {
      alert("Please upload a Job Description (JD) file first!");
      return;
    }

    const formData = new FormData();
    formData.append('difficulty', diff);
    formData.append('round_type', type);
    formData.append('jd_file', jdFile);

    const response = await fetch("{% url 'generate_invite' %}", {
      method: "POST",
      headers: {
        "X-CSRFToken": "{{ csrf_token }}"
      },
      body: formData
    });

    const data = await response.json();
    if (data.url) {
      document.getElementById('generatedLink').textContent = data.url;
      const box = document.getElementById('linkBox');
      box.style.display = 'block';
      box.scrollIntoView({ behavior: 'smooth' });
    }
  }

  document.getElementById('generateBtn').onclick = generateLink;

  function copyLink() {
    const text = document.getElementById('generatedLink').textContent;
    navigator.clipboard.writeText(text);
    alert("Link copied to clipboard!");
  }

  document.getElementById('sendEmailBtn').onclick = async function () {
    const email = document.getElementById('candidateEmail').value;
    const url = document.getElementById('generatedLink').textContent;
    const statusEl = document.getElementById('emailStatus');

    if (!email) {
      alert("Please enter a candidate email address!");
      return;
    }

    statusEl.style.display = 'block';
    statusEl.style.color = '#94a3b8';
    statusEl.textContent = "Transmitting data...";
    this.disabled = true;

    try {
      const formData = new FormData();
      formData.append('email', email);
      formData.append('url', url);

      const response = await fetch("{% url 'send_interview_link' %}", {
        method: "POST",
        headers: {
          "X-CSRFToken": "{{ csrf_token }}"
        },
        body: formData
      });

      const data = await response.json();
      if (data.success) {
        statusEl.style.color = '#10b981';
        statusEl.textContent = "✅ Invitation transmitted successfully!";
      } else {
        statusEl.style.color = '#ef4444';
        statusEl.textContent = "❌ " + (data.error || "Communication failure");
      }
    } catch (err) {
      statusEl.style.color = '#ef4444';
      statusEl.textContent = "❌ Error connecting to server.";
    } finally {
      this.disabled = false;
    }
  };
</script>
{% endblock content %}
